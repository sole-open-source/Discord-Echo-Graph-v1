services:
  neo4j:
    image: neo4j:5.26.20  # docker pull neo4j:5.26.19-ubi9
    container_name: neo4j-db
    ports:
      - "7474:7474" # Neo4j Browser web interface
      - "7687:7687" # Bolt protocol for client applications
    # volumes:
     # - ./.vols/data:/data # Mount host directory for data persistence
     # - ./.vols/logs:/logs # Mount host directory for logs
     # - ./.vols/import:/var/lib/neo4j/import # Mount for importing data files
    environment:
      # Configure authentication (username/password: neo4j/your_password)
      - NEO4J_AUTH=neo4j/dulcinea200
      # Accept the license agreement
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes

      - NEO4J_PLUGINS=["apoc"]

      # Asegurar que se permitan los procedimientos
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      
      # Opcional pero recomendado para evitar problemas de escritura
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true

    
      #- NEO4J_PLUGINS='["graph-data-science"]'
      # Optional: uncomment to enable APOC procedures if needed
      # - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    # healthcheck:
    #   test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 3
    restart: unless-stopped


