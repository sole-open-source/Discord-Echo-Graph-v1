services:
  postgres-db:
    #image: postgres:15
    image: pgvector/pgvector:pg16
    container_name: edu-dulcinea-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS} 
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
      #- "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
   # volumes:
   #   - ./.vols:/var/lib/postgresql/data

